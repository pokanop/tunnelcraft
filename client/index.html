<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1215" />
    <title>TUNNELCRAFT — networking, Rust & VPN engineering</title>
    <meta
      name="description"
      content="From first packet to production tunnel: 37 modules, 162 lessons, and 62 hands-on labs across networking fundamentals, Rust, WireGuard, and shipping a real cross-platform VPN client."
    />

    <!-- branding -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="TUNNELCRAFT" />

    <!-- social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TUNNELCRAFT — networking, Rust & VPN engineering" />
    <meta
      property="og:description"
      content="The complete path from networking zero to shipping a real VPN client. Hands-on labs, timed finals, spaced-repetition review."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;600;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("tunnelcraft:theme") || "system";
          var light =
            m === "light" ||
            (m === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches);
          document.documentElement.dataset.theme = light ? "light" : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
